<div id="ds-list-{{ selection.pk }}" class="flex flex-wrap gap-1">
  {% for ds in ds_list %}
  <span class="badge badge-outline badge-sm gap-1">
    🎽 {{ ds.display_name }}
    <button type="button" class="text-error font-bold leading-none" title="Remove DS"
            data-on-click="@post('{% url 'events:slot_ds_remove' event.pk squad.pk grid.pk selection.pk ds.user.pk %}', {headers: {'X-CSRFToken': '{{ csrf_token }}'}})">&times;</button>
  </span>
  {% empty %}
  <span class="text-xs text-base-content/40">No DS assigned</span>
  {% endfor %}
</div>
