{% extends "base.html" %}

{% block title %}Help{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="card bg-base-200 shadow-xl">
    <div class="card-body">
      <div class="flex justify-between items-center mb-4">
        <h2 class="card-title text-2xl">Help</h2>
        {% if is_app_admin %}
        <a href="{% url 'help_page_edit' %}" class="btn btn-primary btn-sm">Edit</a>
        {% endif %}
      </div>
      <div class="prose prose-sm max-w-none">
        {{ content_html|safe }}
      </div>
    </div>
  </div>
</div>
{% endblock %}
